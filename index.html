    <!-- Open Graph / social preview. og:image is the favicon for now; swap in a
         1200×630 PNG once deployed. Add <link rel="canonical" href="https://<real-domain>/">
         and og:url then too — a root-relative "/" canonical makes the Vite HTML
         plugin try to read the project root as a file (EISDIR), breaking the build. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Digital Vargani" />
    <meta property="og:title" content="Digital Vargani — Free Vargani & Fund Management for Ganesh Mandals" />
    <meta
      property="og:description"
      content="Instant mobile vargani collection, a live treasurer dashboard, and multilingual receipts donors trust. Free, works on any phone, no app to install."
    />
    <meta property="og:image" content="/icon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
